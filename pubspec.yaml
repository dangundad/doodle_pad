name: doodle_pad
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  get: ^4.7.3
  gma_mediation_applovin: ^2.5.2
  gma_mediation_pangle: ^3.5.3
  gma_mediation_unity: ^1.6.5
  google_fonts: ^8.0.2
  google_mobile_ads: ^7.0.0
  google_nav_bar: ^5.0.7
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  in_app_purchase: ^3.2.3
  in_app_review: ^2.0.11
  lucide_icons_flutter: ^3.1.10
  path_provider: ^2.1.5
  rate_my_app: ^2.3.2
  share_plus: ^12.0.1
  toastification: ^3.0.3
  url_launcher: ^6.3.2
  vibration: ^3.1.8

dev_dependencies:
  build_runner: ^2.12.2
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.11.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/
    - assets/images/icon/
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700
